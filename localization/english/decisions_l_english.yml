l_english:

 form_argentina:0 "Unite the Nation"
 form_argentina_desc:0 "This is it. After endless inner strife and incursions by the realists into our dominions we have finally managed to take hold of a large swathe of land from the defunct Viceroyalty. There are those who still resist our grasp, they must be liberated, by force if necessary. \n\nOur task is far from over, the imperial threat remains a danger to the free peoples of our continent. We must push the shadow of an empire back to sea lest our advances be in vain."