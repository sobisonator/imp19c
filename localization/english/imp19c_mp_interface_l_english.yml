 # Description >>>
 mp_description:0 "#T Description"
 GBR_DESK:0 "Rule Britannia. \n\nGracefully, the English home islands escaped the pillage that cripples the European continent, as such London finds itself in a prime position to exploit its rival weaknesses, expanding the holdings in India, Canada and Africa. After all, who but England can rule the waves?"
 PRU_DESK:0 "One eagle fall, another one rises. \n\nPrussia has recovered its lost territories, occupied by the administrators in Paris for years, these dominions greatly accepted the return to Berlin's hands. Perhaps Friedrich can take on the momentum to extend his dominions before the Austrians dominate the Germanic sphere..."
 RUS_DESK:0 "Land of the Rus. \n\nThe russian giant was paramount in the erradication of Napoleon's Empire from the map. Now, with his western dominions back under Moscow control, Tzar Aleksandr looks to solidify control over the insurgency in the Caucasus once and for all. But managing an empire streching from Warsaw to Alaska will not be a simple task for the young emperor..."
 FRA_DESK:0 "Borbonic Restoration.\n\nFrance reels from decades of warfare as Napoleon gets casted away in St. Helena, doomed to relieve Leipzig, Vitoria and Waterloo in his mind every day. The Bourbons have been reinstated and the borders have receded. Now it is up to the coldly received king to heal the scars, if such a task is even possible."
 NED_DESK:0 "Lux in Tenebris. \n\nCrafted out of the Congress of Vienna, the Low Countries have to forge a destiny of their own if they don't want to live in the shadow of their much larger neighbours..."
 AUS_DESK:0 "Gott Erhalte. \n\nAustrian hegemony came to be utterly demolished during the Napoleonic Era has defeat followed an even greater defeat. The Holy Roman Empire met its ultimate disolution after Austerlitz in 1806. Whilst the nation has been restored to its former borders and powers, noone would seriously claim that Austria is but a shadow of what is was."
 TUR_DESK:0 "The Sick Man of Europe. \n\nIn its hayday the Ottomans were feared and respected by the courts of Europe, who trembled upon the sight of Janissaries and Bombards alike. However in this new century, a string of defeats and humilliations have toppled the Empire's prestige in the eyes of the world. Our subjects openly defy orders from the Sultan and tax collectors enlarge their own pockets in the far flung provinces. It will take all the might of Mahmud II to avoid a total collapse of the Sublime Porte."
 SAR_DESK:0 "Il Canto Degli Italiani. \n\nThe Napoleonic stampede across Italy has awoken a large section of the population's national conciousness, neither Austrian nor French dominance can again be tolerated on these lands. However, it will take time and a coherent plan to unite the division that grips this peninsula once and for all."
 SPA_DESK:0 "Spain's Overture.\n\n Occupied and besieged for years during the Napoleonic incursion, the colonies in the americas were prompted, by both uncertainty and the delay in communications, to rebel against Madrid, aided by London. Fernando VII has an impossible choice to make. Either scramble up the scant resources left to try and reclaim the American dominion, or forgo it in it's entirety, knowing that those wayward sons will not return out of their own volition."
 USA_DESK:0 "E Pluribus Unum. \n\nThe United States, freed from British control has managed to carve itself a sizeable dominion in their corner of the Americas. Washington now looks further westward, eyeing up the dominions still in control by the colonial authorities of european courts. Using either diplomacy, warfare, or a combination of both, the americans have seen fit to fullfill their Manifest Destiny, at all costs. "
 VNZ_DESK:0 "Guerra a Muerte\n\n Bolivar has been exiled, but his decree of total war echoes deep in the minds of the insurgents. In their horrendous struggle for emancipation, the rebelious elements turn to the leadership of Antonio Paez to lead them in the crucible of their lifetimes."
 MEX_DESK:0 "Grito de Dolores.\n\nEver since 1810 Mexico has been torn apart into patriot and realist elements. Spain's downfall from grace has prompted the New Spain aristocracy and commoners to challenge their colonial overlords. However, a significant part of the populace, specially the military and merchants, support the old establishment. Whether the coin can sustain the rifle as the war drags on remains to be seen..."
 EGY_DESK:0 "A Legend Rises. \n\n Muhammad Ali has risen from being an albanian villager to the de-facto ruler of Ottoman Egypt. Whilst noone would dare openly challenge the sultan's dominion directly, it can hardly be expected of Muhammad to keep Egypt as a spineless vassal. History awaits for him to act, to seize the opportunity of a lifetime and devour the Ottoman carcass from within."
 EIC_DESK:0 "In 1815, the East India Company was a powerful player on the world stage. Her ships plied the expanses of the Indian Ocean, transporting goods and maintaining trade relations between the countries."
 KHL_DESK:0 "The Sikh Empire in 1815 was a powerful state based on the principles of equality, justice and harmony between various religious and ethnic groups. The empire was headed by a wise and just ruler who cared about the welfare of his people."
 CHI_DESK:0 "Mandate of Heaven \n\nThe chinese firmly believe that their right to rule has been granted by the heavens themselves, personified in the person of the Emperor. However divine the rule, Emperor Jiaqing must not stand idle as the emergence of the Russian state threatens to end their long-standing hegemony on this corner of the globe."
 TKG_DESK:0 "The Land of the Rising Sun. \n\nThe isolianist Japanese have mostly kept confined to their home islands, embroiled in internal strife amongst the Shogun and the Daimyo subjects for generations. However, it is only a matter of time for a superior entity to force the inhabitants of these islands to answer the call of the modern era."
 AR1_DESK:0 "Argentina lies on the brink of destruction. Federalist have tear this nation asunder whilst the conflict with the shadow of Spain's empire rips the northern border. Across the Andes, the Chilean rebellion has been quashed. Nothing short of a miracle can save the Argentine experiment."
 LFP_DESK:0 "Buenos Aires dictatorial goverment have prompted a civil war within the independence war of the peoples of the southern cone, they claim only a federalist confederation can withstand the harsh reality of this region; it will be up to history whether that claim will be upheld."
 PR1_DESK:0 "Dusk is nigh approaching in the remnants of Spain's overseas dominions. Rebelions pave the roads from Buenos Aires to Mazatlan in a fashion never seen before. Only few men have the capabilities to keep this bloated empire together. One of them is José Fernando de Abascal. Commanding the crown jewel of Perú and its gold mines, his actions will dictate the future of this whole continent."
 BRZ_DESK:0 "Brazil, the crown jewel of the Portuguese Empire lays at a crossroads.\n\nSlavery dominates the local politics as well as the increasing demands for greater autonomy within the Lusophone sphere. Merchants and the Upper Strata demand a relaxation on ancient colonial restrictions made by Lisbon in the past centuries. Some even pregonate the advent of an independence movement like in the Spanish America..."