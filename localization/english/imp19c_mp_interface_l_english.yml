 card_independence_movements:0 "#T Independence movements#! \n\nAs the echoes of the American Indepenence and the French Revolution ripple through the continent, men and women of every class are rising up against the colonial administrations that pilfer the native ground of the 'Criollos'. Time will tell wheter their dreams of liberty were a pipe dream or the start of an immemorial legacy."
