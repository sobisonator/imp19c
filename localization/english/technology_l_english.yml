#Military Advances

tech_permanent_army:0 "Permanent Armies"
tech_permanent_army_desc:0 "The use of full time soldiers had existed since antiquity, it was not, however, until the Napoleonic Era when it started to become a necessity rather than a luxury."

tech_commissioned_staff:0 "Commisioned Staff"
tech_commissioned_staff_desc:0 "Any soldier that proves their worth in the battlefield can obtain a commision issued by the goverment to command our host in the field. This promotes ambition and discipline across our entire army."

tech_regimental_structure:0 "Regimental Structure"
tech_regimental_structure_desc:0 "By dividing our land elements into a structured regimental composition, with unique goals and task during combat we can ensure an organized theatre of operations."

tech_specialised_corps:0 "Specialised Corps"
tech_specialised_corps_desc:0 "Within our regiments, it is imperative the best suited for tasks suchs as pontoon-building, demolitions or leadership heed their talent as soon as possible."

tech_mass_mobilisation:0 "Mass Mobilisation"
tech_mass_mobilisation_desc:0 "If dire times befall upon us we can always resort to a wartime mass levy."

tech_field_ambulances:0 "Field Ambulances"
tech_field_ambulances_desc:0 "The sheer number of casualties brought upon by modern warfare has compelled our military thinkers to propagate our field hospitals directly to the battleline."

tech_skirmisher_corps:0 "Skirmisher Corps"
tech_skirmisher_corps_desc:0 "Running in parallel to our traditional regiments, militray thinkers observe that it would be beneficial to amass an irregular corps of behind-the-lines forces to harass the enemy's backline without endangering our main force."

tech_cartography:0 "Cartography"
tech_cartography_desc:0 "Imperative to the correct disposition of either land or naval elements is the profound knowledge of local geography, topography and roads. This often materializes in the form of maps, and having better ones than the enemy should be a national priority of the utmost caliber."

tech_military_treatises:0 "Military Treatises"
tech_military_treatises_desc:0 "Upon retirement, and with ample time on their hands, we have dictaminated a final task for our outgoing generals; to render all of their knowledge into paper, thus preserving our nation's military accumen and prevent it from falling into oblivion."

tech_mass_artillery:0 "Mass Artillery"
tech_mass_artillery_desc:0 "When our enemies cower behind their fortified positions, rather than wasting our manpower in senseless infantry charges, we can have leave the talking to the heavy ordnance."

tech_post_napoleonic_warfare:0 "Post-Napoleonic Warfare"
tech_post_napoleonic_warfare_desc:0 ""

tech_snipers:0 "Snipers"
tech_snipers_desc:0 "Franc-tireurs , or Snipers originated from civilians enthusiasts who tinkered with long-range rifling. By the coming of our age it would be much unwise to disregard their potential in the battlefield. "

tech_trench_warfare:0 "Trench Warfare"
tech_trench_warfare_desc:0 "The nature of war itself has changed. No more will decisive battles tailor empires, now it is down to a nefarious contest of atrittion that dictates who is the ultimate victor."

tech_dispersed_unit_tactics:0 "Dispersed Unit Tactics"
tech_dispersed_unit_tactics_desc:0 "Sometimes, it's not the best idea to march ahead with a formation of thighly packed regiments into the field. Artillery is increasingly tearing asunder such assets. Therefore it's up to the generals in the field to ascertain when to put into practice a different approach."

tech_camouflage:0 "Camouflage"
tech_camouflage_desc:0 "It would appear that having bright coloured uniforms in the battlefield is counterintuitive to the overall secrecy of our movements and flaking maneuvers. Military thinkers are starting to tinker with drab, pale colors of uniform to blend into the enviroment."

tech_storm_troopers:0 "Storm Troopers"
tech_storm_troopers_desc:0 "Elite, lightly equipped assault specialist units trained to infiltrate deep into enemy lines, bypassing strongpoints to collapse defensive networks from within."

tech_weapon_manufacturing:0 "Weapon Manufacturing"
tech_weapon_manufacturing_desc:0 "If the state itself handles its own supply production rather than relying on purchasing or looting the supplies during our campaings, we are sure to profit from the investment in the long run."

tech_firearms:0 "Firearms"
tech_firearms_desc:0 "Harnessing the explosive powder completely alters personal combat. With the power of a thousand suns in the palm of your hand, destiny awaits our nation's future."

tech_rifles:0 "Rifles"
tech_rifles_desc:0 "Cutting precise spiral grooves inside a weapon barrel imparts a stabilizing spin on the projectile. This simple engineering feat dramatically enhances the accuracy and effective range of individual soldiers during engagement phases."

tech_replaceable_weapon_parts:0 "Replaceable Weapon Parts"
tech_replaceable_weapon_parts_desc:0 "Manufacturing internal components to standarized measurements and sizes allows identical parts to be swapped freely between individual weapons no matter the producer. This streamlines field maintenance and removes the need for custom gunsmithing to repair broken components."

tech_sword_bayonet:0 "Sword Bayonet"
tech_sword_bayonet_desc:0 "Attaching a long, heavy blade to the muzzle of an infantry firearm provides essential defensive reach in close-quarters combat. When detached, it functions perfectly as a standalone combat sword or utility tool."

tech_guncotton:0 "Guncotton"
tech_guncotton_desc:0 "Treating organic fibers with powerful acids produces a highly volatile nitrocellulose compound. This material serves as an incredibly potent explosive force, delivering a violent blast profile that far exceeds traditional black powder formulas."

tech_nitroglycerin:0 "Nitroglycerin"
tech_nitroglycerin_desc:0 "This heavy, oily liquid stands as an incredibly powerful chemical explosive. While it delivers unparalleled destructive force for engineering and demolition tasks, its extreme sensitivity requires maximum caution during storage and transport."

tech_rifling_standardisation:0 "Rifling Standardisation"
tech_rifling_standardisation_desc:0 "Enforcing uniform specifications for barrel dimensions and internal grooves guarantees consistent ballistics across mass-produced firearms. Every weapon leaving the line performs identically, simplifying training and predicting accuracy across large units."

tech_fulminate_powder:0 "Fulminate Powder"
tech_fulminate_powder_desc:0 "These highly sensitive primary chemical compounds are engineered to detonate violently upon physical impact. They provide the instantaneous flash necessary to ignite main explosive charges reliably inside modern weapon firing systems."

tech_smokeless_powder:0 "Smokeless Powder"
tech_smokeless_powder_desc:0 "Advanced chemical propellants produce minimal residue and gas clouds upon firing. This maintains clear battlefield visibility for infantry units while keeping individual firing positions concealed from distant enemy spotters."

tech_percussion_cap_ignition:0 "Percussion Cap Ignition"
tech_percussion_cap_ignition_desc:0 "Using shock-sensitive chemical primers contained in small copper caps ensures rapid, reliable weapon firing. This system protects the ignition source from wind and rain, guaranteeing operation in unfavorable weather conditions."

tech_bullet_innovation:0 "Bullet"
tech_bullet_innovation_desc:0 "Moving away from simple spherical projectiles leads to aerodynamic, elongated shapes that cut cleanly through the air. These optimized munitions maintain velocity over longer distances and drastically increase impact energy."

tech_early_cartridges:0 "Early Cartridges"
tech_early_cartridges_desc:0 "Consolidating the projectile and the necessary powder charge into a single, pre-measured paper or skin packet simplifies infantry logistics. Soldiers can load their weapons much faster, skipping tedious loose powder measurements."

tech_improved_cartridges:0 "Improved Cartridges"
tech_improved_cartridges_desc:0 "Enclosing the bullet, primer, and propellant within a single metallic casing provides complete protection against moisture. The durable design expands upon firing, effectively sealing the weapon breech to prevent dangerous gas leaks."

tech_breechloader:0 "Breechloader"
tech_breechloader_desc:0 "Loading ammunition directly into the rear of the weapon barrel simplifies the firing cycle. This design choice enables soldiers to reload quickly while remaining safely prone or behind defensive low cover."

tech_minie_ball:0 "Minié Ball"
tech_minie_ball_desc:0 "Featuring a hollow base that expands from gas pressure upon firing, this conical projectile tightly grips barrel rifling. It combines the easy loading of smoothbore weapons with the incredible accuracy of rifles."

tech_dynamite:0 "Dynamite"
tech_dynamite_desc:0 "Absorbing highly sensitive explosive liquids into inert materials produces stable, solid blasting sticks. This compound can be safely handled, stored, and transported without detonating from minor shocks, revolutionizing combat demolitions."

tech_pinfire_primer:0 "Pinfire Primer"
tech_pinfire_primer_desc:0 "An early self-contained metallic cartridge utilizing a small integrated pin that protrudes from the casing base. When struck directly by the weapon hammer, it ignites the internal priming compound safely."

tech_experimental_revolver:0 "Experimental Revolver"
tech_experimental_revolver_desc:0 "Early multi-shot handguns explore unique mechanical designs to achieve rapid personal firepower. While complex and prone to mechanical faults, they provide single operators with unprecedented close-range defense capabilities."

tech_hand_cranked_machine_guns:0 "Hand-Cranked Machine Guns"
tech_hand_cranked_machine_guns_desc:0 "Utilizing a cluster of rotating barrels operated by a manual hand-crank provides continuous, rapid fire. These heavy weapon systems require dedicated crews but can single-handedly suppress entire charging infantry formations."

tech_standard_issue_revolver:0 "Standard Issue Revolver"
tech_standard_issue_revolver_desc:0 "Rugged, mechanically sound handguns featuring a rotating cylinder become standard sidearms for military personnel. They provide immediate, multi-shot self-defense capabilities for officers, cavalry troopers, and specialized support units."

tech_late_small_arms_manufacturing:0 "Late Small Arms Manufacturing"
tech_late_small_arms_manufacturing_desc:0 "Advanced heavy machinery and automated production lines allow the rapid assembly of complex weapons. Utilizing precise metal-stamping techniques keeps production costs low while providing thousands of uniform firearms to front-line troops."

tech_bolt_action_rifle:0 "Bolt-Action Rifle"
tech_bolt_action_rifle_desc:0 "Operating a manual sliding bolt handles the extraction and chambering of cartridges from an internal magazine. This sturdy mechanism delivers extreme mechanical reliability alongside exceptional accuracy at long ranges."

tech_recoil_powered_machine_guns:0 "Recoil-Powered Machine Guns"
tech_recoil_powered_machine_guns_desc:0 "Harnessing the violent rearward kinetic energy generated by firing automatically cycles the weapon mechanism. This allows continuous, rapid fire for as long as the trigger remains depressed, dominating open territory."

tech_rifle_grenade:0 "Rifle Grenade"
tech_rifle_grenade_desc:0 "Fitting explosive projectiles directly onto standard infantry weapon muzzles allows them to be launched via blank cartridges. This grants squads portable, high-angle explosive firepower well beyond standard hand-throwing ranges."

tech_fragmentation_hand_grenade:0 "Fragmentation Hand Grenade"
tech_fragmentation_hand_grenade_desc:0 "A compact, hand-thrown explosive enclosed within a heavy, grooved iron casing. Upon detonation, the shell shatters into a lethal cloud of high-velocity fragments, clearing out trenches and enclosed rooms."

tech_anti_tank_grenade:0 "Anti-Tank Grenade"
tech_anti_tank_grenade_desc:0 "Heavily weighted hand-thrown charges packed with concentrated high explosives are engineered specifically to defeat thick plating. They damage tracking systems or rupture the armored hulls of heavy combat vehicles."

tech_rocket_propelled_grenade:0 "Rocket-Propelled Grenade"
tech_rocket_propelled_grenade_desc:0 "Shoulder-launched, fin-stabilized rocket systems give small infantry teams the ability to engage armored targets. The portable explosive warhead can penetrate thick defensive fortifications and vehicle plating from safe distances."

tech_sniper_rifles:0 "Sniper Rifles"
tech_sniper_rifles_desc:0 "Specially selected, high-precision firearms fitted with advanced optical scopes allow marksmen to see distant targets clearly. These weapons excel at isolating and eliminating high-value enemy personnel from hidden positions."

tech_semi_automatic_pistols:0 "Semi-Automatic Pistols"
tech_semi_automatic_pistols_desc:0 "Magazine-fed handguns utilize internal gas or recoil mechanics to chamber a fresh round automatically after every single shot. This offers rapid follow-up fire and fast reloading profiles for personal defense."

tech_light_machine_guns:0 "Light Machine Guns"
tech_light_machine_guns_desc:0 "Portable, air-cooled automatic weapons can be carried and operated by a small mobile team or individual soldier. They bring sustained, devastating suppressive fire support directly alongside advancing front-line infantry squads."

tech_machine_pistols:0 "Machine Pistols"
tech_machine_pistols_desc:0 "Extremely compact handguns capable of fully automatic fire offer immense short-range firepower. While difficult to control during sustained firing, they excel in cramped urban environments and vehicle defense scenarios."

tech_sub_machine_guns:0 "Sub-Machine Guns"
tech_sub_machine_guns_desc:0 "Lightweight, automatic shoulder weapons designed to chamber standard pistol ammunition offer excellent controllable automatic fire. Their compact size makes them perfect tools for close-quarters raiding and defensive operations."

tech_railway_artillery:0 "Railway Artillery"
tech_railway_artillery_desc:0 "Mounting massive, ultra-heavy siege guns onto reinforced railroad carriages allows the transport of strategic ordnance. These weapons fire colossal shells over extreme distances to demolish fortified cities and outpost into submission."

tech_shipyards:0 "Shipyards"
tech_shipyards_desc:0 "Having dedicated areas on our coastal settlements to the production, maintenance and storage of our naval vessels would go a long way towards eliminating irregularities, streamlining military operations and make it harder for vessels to "dissapear" in the middle of the night."

tech_marine_barometer:0 "Marine Barometer"
tech_marine_barometer_desc:0 "Specially modified atmospheric pressure gauges utilizing protective gimbals resist the constant rocking motions of ocean travel. This vital instrument allows captains to accurately forecast severe weather shifts while at sea."

tech_diving_bells:0 "Diving Bells"
tech_diving_bells_desc:0 "Submersible chambers designed to trap breathable air pockets are lowered beneath the surface. They allow engineering crews to perform underwater hull maintenance, clear harbor obstructions, and salvage sunken cargo safely."

tech_warships:0 "Warships"
tech_warships_desc:0 "Purpose-built ocean vessels designed strictly for naval combat rather than maritime trade. They feature reinforced structural frames and optimized gun placements intended to project lethal military power across deep water."

tech_multiple_deck_warships:0 "Multiple-Deck Warships"
tech_multiple_deck_warships_desc:0 "Massive naval vessels featuring stacked gun decks arranged vertically along the hull. This dense concentration of heavy artillery allows the ship to unleash devastating, synchronized broadsides against opposing fleets."

tech_round_bow_megavessels:0 "Round Bow Megavessels"
tech_round_bow_megavessels_desc:0 "Shifting naval design away from flat prows to rounded, curved bow structures improves overall hull strength. This enhances handling in heavy seas and protects against devastating raking fire from enemy warships."

tech_copper_plating:0 "Copper Plating"
tech_copper_plating_desc:0 "Affixing thin sheets of copper across the underwater portion of wooden hulls prevents the growth of marine organisms. This keeps hulls smooth, maintaining optimal fleet speed and preventing destructive wood-boring worms."

tech_steam_powered_ships:0 "Steam-Powered Ships"
tech_steam_powered_ships_desc:0 "Installing heavy coal boilers and mechanical propulsion systems frees naval fleets from relying on unpredictable wind conditions. This allows reliable tactical maneuvering and consistent cruising speeds during oceanic deployments."

tech_naval_explosives:0 "Naval Explosives"
tech_naval_explosives_desc:0 "Developing specialized underwater mines and explosive projectiles alters maritime engagements. These weapons inflict massive structural trauma below or at the waterline, rendering traditional hull defense strategies obsolete."

tech_carronade:0 "Carronade"
tech_carronade_desc:0 "Short, lightweight naval guns designed to throw massive projectiles at close range. While lacking long-distance accuracy, their devastating impact power makes them ideal weapons for shattering enemy hulls during boarding actions."

tech_torpedoes:0 "Torpedoes"
tech_torpedoes_desc:0 "Self-propelled underwater rockets packed with heavy explosive warheads which target the unprotected areas from below a ship's waterline. They bypass thick side armor entirely, causing catastrophic hull flooding upon detonation."

tech_cannons:0 "Cannons"
tech_cannons_desc:0 "To the cannon, all men are equal."

tech_rocket_artillery:0 "Rocket Artillery"
tech_rocket_artillery_desc:0 ""

tech_congreve_rocket:0 "Congreve Rocket"
tech_congreve_rocket_desc:0 ""

tech_fortress_guns:0 "Fortress Guns"
tech_fortress_guns_desc:0 "With the advent of the cannon, it's only natural we emplace such asset atop our fortifications and coastal defences."

tech_horse_artillery:0 "Horse Artillery"
tech_horse_artillery_desc:0 "A problematic feature of the beloved cannon is its massive weight. If we attach beasts of burden to it, we can benefit from a sharp increase in deploying the artillery in combat. A side effect is that the men won't have to pull the cannons up the side of a mountain."

tech_limber:0 "Limber"
tech_limber_desc:0 ""

tech_mortar:0 "Mortar"
tech_mortar_desc:0 ""

tech_howitzer:0 "Howitzer"
tech_howitzer_desc:0 ""

tech_artillery_cartridges:0 "Artillery Cartridges"
tech_artillery_cartridges_desc:0 "If we were to enclose our artillery munitions into pre-measured metallic casings we would surely profit from an increased reliability in combat. "

tech_recoil_buffers:0 "Recoil Buffers"
tech_recoil_buffers_desc:0 "Cannons used to tear themselves asunder by the sheer force of firing, however, by implementing heavy spring mechanisms to absorb this immense backward energy we can shorthen the time and strain of reloading, increasing the uptime of our artillery pieces."

tech_quick_firing_gun:0 "Quick-Firing Gun"
tech_quick_firing_gun_desc:0 ""

tech_rocket_salvos:0 "Rocket Salvos"
tech_rocket_salvos_desc:0 "Like the broadsides of the navies of yesteryear, having multiple cannons fire at the same time in unison is music to our ears and the doom of our enemies."

tech_remote_detonations:0 "Remote Detonations"
tech_remote_detonations_desc:0 "By utilizing electrical signals and wireless triggers, we can detonate explosive charges from a safe distance, vastly improving demolition safety and siege efficacy."
 
tech_infantry_mortars:0 "Infantry Mortars"
tech_infantry_mortars_desc:0 "Man-portable, high-angle fire support weapons that allow frontline infantry units to lob explosive shells directly into enemy trenches and fortifications."

tech_heavy_siege_howitzers:0 "Heavy Siege Howitzers"
tech_heavy_siege_howitzers_desc:0 "Massive, high-caliber artillery pieces designed to shatter concrete fortifications and breach the most formidable defensive lines."
 
tech_guided_missiles:0 "Guided Missiles"
tech_guided_missiles_desc:0 "Equipping rockets with advanced guidance systems allows for precise, long-range strikes against high-value targets with minimal waste."
 
tech_motorized_traction:0 "Motorized Traction"
tech_motorized_traction_desc:0 "Replacing draft horses with combustion-engine utility trucks and tractors to rapidly deploy and reposition heavy artillery pieces across the theater."
 
tech_self_propelled_guns:0 "Self-Propelled Guns"
tech_self_propelled_guns_desc:0 "Mounting heavy artillery pieces directly onto tracked or wheeled motorized chassis, allowing big guns to keep pace with rapid vanguard advances."
 
tech_early_tanks:0 "Early Tanks"
tech_early_tanks_desc:0 "Rumbling armored beasts designed to cross no-man's-land, crush barbed wire, shrug off small-arms fire, and break the stalemate of trench warfare."

tech_chemical_ordnance:0 "Chemical Ordnance"
tech_chemical_ordnance_desc:0 "Adapting heavy artillery shells to carry toxic chemical agents like chlorine and mustard gas. Delivering these lethal payloads deep behind enemy lines bypasses conventional entrenchments, choking out defensive garrisons and forcing hostile forces to fight in cumbersome protective gear."

tech_area_denial_saturation:0 "Area Denial Saturation"
tech_area_denial_saturation_desc:0 "Combining rapid rocket salvos with persistent chemical agents and heavy incendiaries to render vast swathes of land completely impassable. This devastating doctrine seals off battlefield reinforcement routes and forces the enemy to abandon key defensive sectors entirely."
 
tech_airplane:0 "Airplane"
tech_airplane_desc:0 "We have slipped the surly bonds of Earth to touch the face of God."

