#Academic Advances

tech_education:0 "Education"
tech_education_desc:0 "By removing our children from the streets and into the classroom we can expect our nation to profit in the long run."

tech_scientific_method:0 "Scientific Method"
tech_scientific_method_desc:0 "The antiquated lessons of the past must be dispensed with, superstitions hold no place in our society, every claim has to be proven empirically for it to be taken seriously."

tech_society_analysis:0 "Society Analysis"
tech_society_analysis_desc:0 "Why do we as a society act how we do and not in a different manner? Why do we find certain actions noble whilst other repulse us? The answer to these questions we don't know, but we're getting there."

tech_scientific_revolution:0 "Scientific Revolution"
tech_scientific_revolution_desc:0 "Unbeknownst to our people at large, it would seem science is not only useful in the military arena but can prove it's worth in transportation, medicine, nutrition, and everything in between. Our scientist are enjoying a period of bonanza never seen before."

tech_anthropology:0 "Anthropology"
tech_anthropology_desc:0 "How our society behaves has recently became a subject of incresing interes within our growing scientific ambiance."

tech_scientific_journals:0 "Scientific Journals"
tech_scientific_journals_desc:0 "Knowledge is useless if contained to one's private mind; therefore, a myriad of scientific journals have sprawled, provoking a rich and fruitful scholarly debate among the erudites of the nation."

tech_historiography:0 "Historiography"
tech_historiography_desc:0 "It is not merely sufficient to study our own history but to learn and construct it in a way that help serve our national interest, for the good of the nation."

tech_historicism:0 "Historicism"
tech_historicism_desc:0 "In examining our national legacy, we can either analyze our historic victories and defeats with equal objectivity, or, to our inmense benefit, lean into a narrative of self-aggrandizement."

tech_psychology:0 "Psychology"
tech_psychology_desc:0 "The trappings of the psyche have eluded our people since time immemorial, however, pressed with the necessity to guard our citizen's mental health, the state has seen fit to delve resources into this abstract science."

tech_art_history:0 "Art History"
tech_art_history_desc:0 "It is a widely tought misconception that history is only a realm composed of books and dates. Far from it, compositions from the past and the legacy of them can help us people of the modern era to profit inmensely from the wisdom of days gone bye."

tech_national_epic:0 "National Epic"
tech_national_epic_desc:0 "Every individual profits from having someone to look up to. We have applied the same reasoning to a state level, having a national hero, part of an epic spread far and wide across our demesne helps us all to feel part of the same, conjoined project. It's irrelevant if the story is real or fabricated."

tech_theatre:0 "Theatre"
tech_theatre_desc:0 "Some of the best stories out there are meant to be told to as many ears as possible. Like the Romans of old, we shall build and extend theatres for our citizens to delight in the oldest human tradition ; storytelling."

tech_neoclassicism:0 "Neoclassicism"
tech_neoclassicism_desc:0 "A new cultural current is emerging across our painters and sculptors. Drawing from the themes and inspirations of the greco-roman world. We should further this past-inspired trend as we look into the future and the task ahead of us."

tech_cultural_imperialism:0 "Cultural Imperialism"
tech_cultural_imperialism_desc:0 "There are many ways to go about life and the pursuit of happiness. But ours is the right one."

tech_museums:0 "Museums"
tech_museums_desc:0 "Cloistering our most coveted artifacts for the public at large to observe is a revolutionary concept, but one we are sure to profit from."

tech_romanticism:0 "Romanticism"
tech_romanticism_desc:0 "Our artist are awed by nature, its force, beauty and expanse. There is within us a call to nature we cannot ignore; its time to provide these innovators with state investment."

tech_astronomy:0 "Astronomy"
tech_astronomy_desc:0 "What lies between the stars has compelled our species ever since our origins. But the time is now to finally unravel one of mankind's great misteries."

tech_astrophysics:0 "Astrophysics"
tech_astrophysics_desc:0 "As it turns out, space is vastly more complex than traditional religions imagined and we have a lot of ground to cover, fortunately we have no lack of spacegazers in our mist."

tech_secular_sciences:0 "Secular Sciences"
tech_secular_sciences_desc:0 "Science has for a long time clashed with religion. Galille was burnt at the stake. We can not stop the tides of progress and so we must separate superstition and the fear of the unknown from what is true and empirical, no matter how we feel about it."

tech_absorption_spectroscopy:0 "Absorption Spectroscopy"
tech_absorption_spectroscopy_desc:0 "Our newest discovery in space is that there appears to exist something called "Electromagnetic Radiation" which is one of the key forces that rule the cosmos, we have to learn as much as we can from it."

tech_molecular_physics:0 "Molecular Physics"
tech_molecular_physics_desc:0 "It would seem that the cell is no longer the smallest known organism. Molecules and the interactions between them are the new obsession of our learned minds."

tech_geology:0 "Geology"
tech_geology_desc:0 "Our own land can teach us lessons from its very ground. The rocks and soil that populate our treasured nation can shed light upon its age, origins and the meaning of life itself."